name: ci

on:
  push:
    branches: [main, dev]
    tags:
      - "v*"
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: python -m pip install "ruff>=0.4"

      - name: Run ruff
        run: ruff check src/ tests/

  architecture:
    name: Architecture Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run architecture boundary checks
        run: python tools/check_architecture.py

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,diagnose,mcp]"

      # Node toolchain for the refactor-demo's TypeScript fixture. Without
      # this, _has_tsc() in tests/test_refactor_demo.py is False and all real
      # tsc end-to-end tests silently skip, leaving the demo's central
      # correctness claim unverified in CI.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"

      - name: Install refactor-demo TS fixture dependencies
        working-directory: examples/refactor_demo/fixture_repo_ts
        run: npm ci

      - name: Run test suite
        run: pytest -q --junitxml=test-results.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results.xml
          retention-days: 14

  benchmark-smoke:
    name: Benchmark Smoke
    runs-on: ubuntu-latest
    needs: [architecture]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run benchmark regression smoke
        run: python tools/benchmark_regression_smoke.py

  benchmark-regression:
    name: Benchmark Regression
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and LangGraph benchmark dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[langgraph,benchmark]"

      - name: Run benchmarks
        run: make benchmark

      - name: Check benchmark regression
        run: python tools/benchmark_drift_check.py

  tla-check:
    name: TLA+ Model Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Run TLC model checker
        run: make tla-check

  protocol-corpus:
    name: Protocol Corpus (Python ↔ Node parity)
    runs-on: ubuntu-latest
    needs: [architecture]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"

      - name: Install library + dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      # Check out the plugin repo INSIDE the workspace so actions/checkout
      # accepts the path (it rejects paths outside $GITHUB_WORKSPACE). The
      # harness's resolve_node_dist_path() picks up the explicit env var below
      # rather than the sibling-fallback path.
      - name: Check out agent-coherence-plugin
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          repository: hipvlady/agent-coherence-plugin
          ref: main
          path: _plugin_checkout

      - name: Build Node coordinator
        working-directory: _plugin_checkout
        run: |
          npm ci
          npm run build

      - name: Run protocol corpus
        env:
          AGENT_COHERENCE_PLUGIN_DIST_PATH: ${{ github.workspace }}/_plugin_checkout/dist/coordinator.js
        run: pytest -m protocol_corpus -v --tb=short

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, architecture, test, benchmark-smoke, benchmark-regression, tla-check]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distribution artifacts
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: python-package
          path: dist/
          retention-days: 14
